<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}} | Owen Kobasz</title>
    <meta name="description" content="{{description}}" />
    <link rel="canonical" href="{{canonical_url}}" />
    <link rel="icon" href="/assets/fav.png" sizes="32x32" type="image/png" />

    <!-- Open Graph -->
    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:url" content="{{canonical_url}}" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="Owen Kobasz" />
    {{og_image_tag}}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{title}}" />
    <meta name="twitter:description" content="{{description}}" />
    {{twitter_image_tag}}

    <!-- RSS -->
    <link rel="alternate" type="application/rss+xml" title="Owen Kobasz Blog" href="/blog/rss.xml" />

    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F0EBE0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1A1612" />
    <script>(function(){var t=localStorage.getItem('portfolio-theme');var d=window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',(t==='dark'||t==='light')?t:(d?'dark':'light'));})();</script>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{{title}}",
        "description": "{{description}}",
        "datePublished": "{{date_iso}}",
        "author": {
            "@type": "Person",
            "name": "{{author}}"
        },
        "url": "{{canonical_url}}",
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "{{canonical_url}}"
        }
    }
    </script>

    <link rel="stylesheet" href="/blog.css" />
    {{highlight_css}}

    {{analytics_snippet}}
</head>
<body>
    <div class="reading-progress" id="reading-progress"></div>

    <header class="blog-nav">
        <button class="blog-theme-toggle" id="blog-theme-toggle" type="button" aria-label="Switch to dark mode">
            <svg class="blog-theme-toggle__icon blog-theme-toggle__icon--moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="blog-theme-toggle__icon blog-theme-toggle__icon--sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="blog-nav__toggle" id="blog-nav-toggle" aria-label="Open navigation" aria-expanded="false" aria-controls="blog-nav-overlay">
            <img src="/assets/menu.svg" alt="Menu" width="24" height="24" />
        </button>
    </header>

    <div class="blog-nav-overlay" id="blog-nav-overlay" role="dialog" aria-label="Navigation">
        <button class="blog-nav-overlay__close" id="blog-nav-close" aria-label="Close navigation">&times;</button>
        <ul class="blog-nav-overlay__links">
            <li><a href="/" class="blog-nav-overlay__link">Home</a></li>
            <li><a href="/#about" class="blog-nav-overlay__link">About</a></li>
            <li><a href="/#projects" class="blog-nav-overlay__link">Projects</a></li>
            <li><a href="/blog" class="blog-nav-overlay__link blog-nav-overlay__link--active">Blog</a></li>
            <li><a href="/#contact" class="blog-nav-overlay__link">Contact</a></li>
        </ul>
    </div>

    <article class="blog-post">
        <header class="blog-post__header">
            <a href="/blog" class="blog-post__back">&larr; All posts</a>
            <h1 class="blog-post__title">{{title}}</h1>
            <div class="blog-post__meta">
                <time class="blog-post__date" datetime="{{date_iso}}">{{date_formatted}}</time>
                <span class="blog-post__reading-time">{{reading_time}} min read</span>
            </div>
            {{tags_html}}
        </header>

        <div class="blog-content">
            {{content}}
        </div>
    </article>

    <footer class="footer">
        <a href="/">
            <div class="return-home">
                <img src="/assets/home.svg" alt="Return to top" width="24" height="24" />
            </div>
        </a>
        <div class="socials">
            <a href="https://github.com/owenkobasz" target="_blank" rel="noopener noreferrer">
                <div class="socials__github">
                    <img src="/assets/github-logo.png" alt="GitHub" />
                </div>
            </a>
            <a href="https://www.linkedin.com/in/owen-kobasz/" target="_blank" rel="noopener noreferrer">
                <div class="socials__linkedin">
                    <img src="/assets/linkedin-logo.svg" alt="LinkedIn" />
                </div>
            </a>
            <a href="mailto:owenkobasz@gmail.com" target="_blank">
                <div class="socials__email">
                    <img src="/assets/mail.png" alt="Email" />
                </div>
            </a>
        </div>
        <p class="copyright">Owen Kobasz © 2026</p>
    </footer>

    <script>
    (function() {
        var bar = document.getElementById('reading-progress');
        if (bar) {
            window.addEventListener('scroll', function() {
                var h = document.documentElement;
                var pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
                bar.style.width = Math.min(pct, 100) + '%';
            }, { passive: true });
        }

        var overlay  = document.getElementById('blog-nav-overlay');
        var toggle   = document.getElementById('blog-nav-toggle');
        var closeBtn = document.getElementById('blog-nav-close');
        if (!overlay || !toggle) return;

        function openNav() {
            overlay.classList.add('blog-nav-overlay--open');
            toggle.setAttribute('aria-expanded', 'true');
            document.body.style.overflow = 'hidden';
        }
        function closeNav() {
            overlay.classList.remove('blog-nav-overlay--open');
            toggle.setAttribute('aria-expanded', 'false');
            document.body.style.overflow = '';
        }

        toggle.addEventListener('click', openNav);
        if (closeBtn) closeBtn.addEventListener('click', closeNav);
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) closeNav();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeNav();
        });
    })();

    (function() {
        var btn = document.getElementById('blog-theme-toggle');
        if (!btn) return;

        function updateLabel() {
            var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        }

        updateLabel();

        btn.addEventListener('click', function() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('portfolio-theme', next);
            updateLabel();
        });
    })();
    </script>
</body>
</html>
